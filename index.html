<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutoring — Bower OS</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%232a5c38'/><text x='16' y='23' text-anchor='middle' font-family='sans-serif' font-weight='700' font-size='19' fill='%23d3b890'>M</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  /* ── Light mode (default) ── */
  :root {
    --bg: #f4f3f0;
    --card: #ffffff;
    --card-2: #f7f6f3;
    --line: #e8e4dc;
    --ink: #1c1a17;
    --ink-dim: #6e6a62;
    --accent: #2a5c38;
    --accent-light: #edf4ef;
    --warn: #b84f1c;
    --warn-light: #fef1ec;
    --muted: #9c9890;
    --gold: #96752e;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
  }

  /* ── Dark mode ── */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #161412;
      --card: #1e1c19;
      --card-2: #262320;
      --line: #333028;
      --ink: #f0ece4;
      --ink-dim: #9c9890;
      --accent: #4aad6b;
      --accent-light: #122018;
      --warn: #d4703a;
      --warn-light: #261408;
      --muted: #6e6a62;
      --gold: #d3b890;
      --shadow: 0 1px 3px rgba(0,0,0,0.3);
    }
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'General Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  #root { max-width: 720px; margin: 0 auto; padding-bottom: 100px; }

  /* ── Header ── */
  .app-header {
    background: var(--card);
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 40;
  }
  .header-row { display: flex; justify-content: space-between; align-items: center; }
  .header-title { font-size: 1.3rem; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; line-height: 1; }
  .header-sub { font-size: 0.74rem; color: var(--muted); margin-top: 3px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .refresh-btn {
    background: var(--card-2); border: 1px solid var(--line); color: var(--ink-dim);
    border-radius: 8px; padding: 7px 11px; font-size: 0.82rem; cursor: pointer;
    font-family: inherit;
  }
  .refresh-btn:active { opacity: 0.6; }
  .add-btn {
    background: var(--accent); color: white; border: none;
    border-radius: 8px; padding: 8px 14px; font-size: 0.82rem;
    font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .add-btn:active { opacity: 0.85; }

  /* ── Content ── */
  .content { padding: 14px 16px; }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    margin-bottom: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .card-header {
    padding: 14px 16px;
    display: flex; justify-content: space-between; align-items: center; cursor: pointer;
  }
  .card-header:active { background: var(--card-2); }
  .student-name { font-weight: 600; font-size: 1rem; color: var(--ink); }
  .status-row { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
  .pill {
    font-size: 0.67rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; letter-spacing: 0.02em;
  }
  .pill.ok { background: var(--accent-light); color: var(--accent); }
  .pill.warn { background: var(--warn-light); color: var(--warn); }
  .pill.neutral { background: var(--card-2); color: var(--ink-dim); border: 1px solid var(--line); }
  .chevron { font-size: 1rem; color: var(--muted); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); }
  .chevron.open { transform: rotate(90deg); }
  .card-body { overflow: hidden; max-height: 0; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1); }
  .card-body.open { max-height: 3000px; }
  .card-body-inner { padding: 0 16px 16px; border-top: 1px solid var(--line); }
  .section-label {
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin: 14px 0 6px; font-weight: 600;
  }
  .lesson-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0; font-size: 0.86rem; border-bottom: 1px solid var(--line);
  }
  .lesson-row:last-child { border-bottom: none; }
  .lesson-date { color: var(--ink-dim); }
  .lesson-status { font-size: 0.74rem; font-weight: 500; }
  .lesson-status.completed { color: var(--accent); }
  .lesson-status.scheduled { color: var(--gold); }
  .lesson-status.missed { color: var(--warn); }
  .actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .btn {
    flex: 1; min-width: 90px; padding: 10px 12px; border-radius: 10px; border: none;
    font-size: 0.83rem; font-weight: 600; cursor: pointer; text-align: center;
    text-decoration: none; color: white; font-family: inherit;
  }
  .btn.whatsapp { background: #25D366; color: #0a2e14; }
  .btn.notes { background: var(--card-2); color: var(--ink-dim); border: 1px solid var(--line); }
  .btn.more  { background: var(--card-2); color: var(--ink);     border: 1px solid var(--line); }
  .btn.edit  { background: var(--card-2); color: var(--ink);     border: 1px solid var(--line); }
  .notes-box {
    font-size: 0.84rem; color: var(--ink-dim); background: var(--card-2);
    padding: 10px 12px; border-radius: 8px; margin-top: 8px; line-height: 1.5;
    border: 1px solid var(--line); display: none;
  }
  .notes-box.visible { display: block; }
  .empty   { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 0.9rem; }
  .loading { text-align: center; color: var(--muted); padding: 48px 20px; font-size: 0.88rem; letter-spacing: 0.04em; }

  /* ── Modals ── */
  @keyframes overlayIn { from { background: rgba(0,0,0,0); } to { background: rgba(0,0,0,0.5); } }
  @keyframes sheetUp   { from { transform: translateY(48px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100; animation: overlayIn 0.2s ease forwards;
  }
  .sheet {
    background: var(--card); border: 1px solid var(--line);
    width: 100%; max-width: 720px; border-radius: 20px 20px 0 0;
    padding: 20px; max-height: 90vh; overflow-y: auto;
    animation: sheetUp 0.28s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  .sheet h2 { font-size: 1.05rem; margin: 0 0 16px; color: var(--ink); font-weight: 700; }
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 0.68rem; color: var(--muted);
    margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
  }
  .field input[type="text"], .field input[type="date"], .field input[type="number"], .field select, .field textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--line);
    border-radius: 10px; font-size: 0.95rem; font-family: inherit;
    background: var(--card-2); color: var(--ink);
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--accent);
  }
  .field input::placeholder, .field textarea::placeholder { color: var(--muted); }
  .field textarea { min-height: 70px; resize: vertical; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; }
  .checkbox-row input { width: 18px; height: 18px; accent-color: var(--accent); }
  .btn-row { display: flex; gap: 10px; margin-top: 18px; }
  .btn.cancel { background: var(--card-2); color: var(--ink); border: 1px solid var(--line); flex: 0 0 auto; padding: 10px 18px; }
  .btn.save   { background: var(--accent); color: white; }
  .session-list { margin: 10px 0; }
  .session-pick-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 0.9rem; color: var(--ink-dim);
  }
  .session-pick-row input { width: 18px; height: 18px; accent-color: var(--accent); }
  .tools-menu { display: flex; flex-direction: column; gap: 7px; margin-top: 4px; }
  .tools-menu button {
    text-align: left; padding: 13px 15px; border-radius: 10px;
    border: 1px solid var(--line); background: var(--card-2); font-size: 0.88rem;
    cursor: pointer; color: var(--ink); font-family: inherit; font-weight: 500;
  }
  .tools-menu button:active { opacity: 0.7; }

  /* ── Global tools button ── */
  .global-tools-btn {
    position: fixed; bottom: calc(20px + env(safe-area-inset-bottom, 0px)); left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--bg); border: none; border-radius: 24px;
    padding: 12px 26px; font-size: 0.86rem; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.18); z-index: 50; white-space: nowrap;
    font-family: inherit; letter-spacing: 0.01em;
  }
  .global-tools-btn:active { opacity: 0.85; }
  @media (prefers-color-scheme: dark) {
    .global-tools-btn { box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
  }

  /* ── Growth calculator ── */
  .calc-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 0; font-size: 0.82rem; }
  .calc-grid-cell { padding: 7px 4px; border-top: 1px solid var(--line); color: var(--ink-dim); }
  .calc-grid-head { padding: 0 4px 7px; font-size: 0.67rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

  /* ── Free lesson button ── */
  .free-btn {
    font-size: 0.65rem; padding: 2px 8px; border-radius: 10px;
    border: 1px solid var(--line); cursor: pointer; white-space: nowrap; font-family: inherit;
  }
  .free-btn.active   { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  .free-btn.inactive { background: var(--card-2); color: var(--muted); }

  /* ── Version tag ── */
  .version-tag { text-align: center; color: var(--muted); font-size: 0.65rem; padding: 60px 0 8px; opacity: 0.45; }

  /* ── Month group ── */
  .month-hdr {
    display:flex; justify-content:space-between; align-items:center;
    padding:9px 0; cursor:pointer; border-bottom:1px solid var(--line);
  }
  .month-hdr:active { opacity:0.7; }
  .month-chevron { font-size:0.9rem; color:var(--muted); display:inline-block; transition:transform 0.2s; }
  .lesson-row { cursor:pointer; }
  .lesson-row:active { background:var(--card-2); margin:0 -4px; padding:7px 4px; border-radius:6px; }

  /* ── Animations ── */
  @keyframes fadeInUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
  .summary-widget { animation: fadeInUp 0.35s cubic-bezier(0.4,0,0.2,1) both; }
  .card { animation: fadeInUp 0.32s cubic-bezier(0.4,0,0.2,1) both; }
  .card:nth-child(1) { animation-delay:0.05s; }
  .card:nth-child(2) { animation-delay:0.09s; }
  .card:nth-child(3) { animation-delay:0.13s; }
  .card:nth-child(4) { animation-delay:0.17s; }
  .card:nth-child(5) { animation-delay:0.21s; }
  .card:nth-child(6) { animation-delay:0.25s; }
  .card:nth-child(7) { animation-delay:0.28s; }
  .card:nth-child(8) { animation-delay:0.31s; }
  .card:nth-child(9) { animation-delay:0.34s; }
  .card-body-inner { animation: fadeIn 0.22s ease both; }

  /* ── Toggle switch ── */
  .toggle-wrap { display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none; }
  .toggle-track {
    width:44px; height:26px; border-radius:13px; position:relative; flex-shrink:0;
    transition: background 0.22s cubic-bezier(0.4,0,0.2,1);
  }
  .toggle-track.on  { background: var(--accent); }
  .toggle-track.off { background: var(--card-2); border: 1.5px solid var(--line); }
  .toggle-thumb {
    position:absolute; top:3px; width:18px; height:18px; border-radius:9px;
    background:white; box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    transition: left 0.22s cubic-bezier(0.4,0,0.2,1);
  }
  .toggle-track.on  .toggle-thumb { left:22px; }
  .toggle-track.off .toggle-thumb { left:3px; }
  .toggle-label { font-size:0.88rem; color:var(--ink); }
  .rate-cash-row { display:flex; align-items:center; gap:12px; }
  .rate-cash-row input { width:90px !important; flex-shrink:0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const SUPABASE_URL = 'https://uilytgubukiinyrqrltj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_WK5p8tUAsNLEqnmxVT7Eag_2EVNbi7V';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function daysBetween(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  return Math.floor((now - d) / (1000 * 60 * 60 * 24));
}

function currentSchoolYear(baseYear, asOfDate) {
  if (baseYear == null || !asOfDate) return null;
  const ref = new Date(asOfDate);
  const now = new Date();
  let bumps = 0;
  let cursor = new Date(ref.getFullYear(), 7, 1); // 1 August of ref's year
  if (ref >= cursor) cursor.setFullYear(cursor.getFullYear() + 1);
  while (cursor <= now) {
    bumps++;
    cursor.setFullYear(cursor.getFullYear() + 1);
  }
  return Math.min(baseYear + bumps, 13);
}

const PRESET_BOARDS = ['Edexcel', 'AQA', 'Edexcel IGCSE', 'OCR'];

function getCurrentRate(studentId, rateHistory, fallback = 90) {
  const today = new Date().toISOString().slice(0, 10);
  const rows = (rateHistory || [])
    .filter(r => r.student_id === studentId && r.effective_from_date <= today)
    .sort((a, b) => b.effective_from_date.localeCompare(a.effective_from_date));
  return rows.length > 0 ? parseFloat(rows[0].rate) : fallback;
}

// ---------- Toggle ----------
function Toggle({ checked, onChange, label }) {
  return (
    <div className="toggle-wrap" onClick={() => onChange(!checked)}>
      <div className={`toggle-track ${checked ? 'on' : 'off'}`}>
        <div className="toggle-thumb" />
      </div>
      {label && <span className="toggle-label">{label}</span>}
    </div>
  );
}

// ---------- Summary Widget ----------
function SummaryWidget({ students, rateHistory }) {
  const active = students.filter(s => s.active);

  const weeklyNet = active.reduce((sum, s) => {
    const rate = getCurrentRate(s.id, rateHistory);
    return sum + (s.pays_in_cash ? rate : rate * 0.6);
  }, 0);
  const annualNet = weeklyNet * 40;
  const fmt = n => n >= 1000 ? `£${(n / 1000).toFixed(1)}k` : `£${Math.round(n)}`;

  const SEP_TARGET = 10;
  const FULL_TARGET = 15;
  const awayFromSep = Math.max(0, SEP_TARGET - active.length);
  const awayFromFull = Math.max(0, FULL_TARGET - active.length);

  const stats = [
    { label: 'students', value: active.length,  accent: false },
    { label: 'net/week', value: fmt(weeklyNet),  accent: true  },
    { label: 'net/year', value: fmt(annualNet),  accent: true  },
  ];

  return (
    <div className="summary-widget" style={{background:'var(--card)',border:'1px solid var(--line)',borderTop:'3px solid var(--gold)',borderRadius:14,padding:'16px',marginBottom:14}}>
      {/* Stats row */}
      {active.length > 0 && (
        <div style={{display:'flex',gap:0,flexWrap:'wrap',marginBottom:16,paddingBottom:14,borderBottom:'1px solid var(--line)'}}>
          {stats.map(({label, value, accent}) => (
            <div key={label} style={{flex:'1 1 70px',minWidth:60}}>
              <div style={{fontSize:'1.85rem',fontWeight:700,color:accent?'var(--gold)':'var(--ink)',letterSpacing:'-0.03em',lineHeight:1}}>{value}</div>
              <div style={{fontSize:'0.66rem',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.06em',marginTop:4}}>{label}</div>
            </div>
          ))}
        </div>
      )}
      {/* Goal tracker */}
      <div style={{fontSize:'0.66rem',textTransform:'uppercase',letterSpacing:'0.08em',color:'var(--muted)',marginBottom:10,fontWeight:600}}>Goal</div>
      <div style={{marginBottom:10}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
          <span style={{fontSize:'0.82rem',color:'var(--ink-dim)'}}>10 by September</span>
          <span style={{fontSize:'0.78rem',fontWeight:600,color:awayFromSep===0?'var(--accent)':'var(--muted)'}}>
            {awayFromSep===0?'✓ reached':`${active.length} / ${SEP_TARGET}`}
          </span>
        </div>
        <div style={{background:'var(--card-2)',borderRadius:4,height:5,border:'1px solid var(--line)'}}>
          <div style={{background:'var(--accent)',width:`${Math.min(active.length/SEP_TARGET,1)*100}%`,height:'100%',borderRadius:4,transition:'width 0.6s cubic-bezier(0.4,0,0.2,1)'}}></div>
        </div>
      </div>
      <div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
          <span style={{fontSize:'0.82rem',color:'var(--ink-dim)'}}>15 fully booked</span>
          <span style={{fontSize:'0.78rem',fontWeight:600,color:awayFromFull===0?'var(--gold)':'var(--muted)'}}>
            {awayFromFull===0?'🎉 fully booked!':`${active.length} / ${FULL_TARGET}`}
          </span>
        </div>
        <div style={{background:'var(--card-2)',borderRadius:4,height:5,border:'1px solid var(--line)'}}>
          <div style={{background:'var(--gold)',opacity:awayFromFull===0?1:0.55,width:`${Math.min(active.length/FULL_TARGET,1)*100}%`,height:'100%',borderRadius:4,transition:'width 0.6s cubic-bezier(0.4,0,0.2,1)'}}></div>
        </div>
      </div>
    </div>
  );
}

function normaliseUKPhone(raw) {
  const digits = (raw || '').replace(/\D/g, '');
  if (!digits) return '';
  if (digits.startsWith('44')) return digits;
  if (digits.startsWith('0')) return '44' + digits.slice(1);
  return '44' + digits;
}

// ---------- Growth Calculator ----------
function GrowthCalculator({ students, rateHistory }) {
  const active = students.filter(s => s.active);
  const avgRate = active.length > 0
    ? Math.round(active.reduce((sum, s) => sum + getCurrentRate(s.id, rateHistory), 0) / active.length)
    : 90;

  const [extra, setExtra] = useState(4);
  const [extraRate, setExtraRate] = useState(avgRate);
  const [extraCash, setExtraCash] = useState(false);

  const currGrossW = active.reduce((sum, s) => sum + getCurrentRate(s.id, rateHistory), 0);
  const currNetW   = active.reduce((sum, s) => {
    const r = getCurrentRate(s.id, rateHistory);
    return sum + (s.pays_in_cash ? r : r * 0.6);
  }, 0);
  const addGrossW = extra * extraRate;
  const addNetW   = extra * extraRate * (extraCash ? 1 : 0.6);

  const fmt = n => n >= 1000 ? `£${(n / 1000).toFixed(1)}k` : `£${Math.round(n)}`;

  const rows = [
    { label: 'Students',  curr: active.length,    add: extra,      isCount: true },
    { label: 'Gross/wk', curr: currGrossW,        add: addGrossW  },
    { label: 'Net/wk',   curr: currNetW,          add: addNetW    },
    { label: 'Gross/yr', curr: currGrossW * 40,   add: addGrossW * 40 },
    { label: 'Net/yr',   curr: currNetW * 40,     add: addNetW * 40   },
  ];

  return (
    <div>
      <div style={{display:'flex', gap:10, marginBottom:12}}>
        <div className="field" style={{flex:1, marginBottom:0}}>
          <label>Extra students</label>
          <input type="number" min="1" value={extra} onChange={e => setExtra(parseInt(e.target.value)||1)} />
        </div>
        <div className="field" style={{flex:1, marginBottom:0}}>
          <label>Rate £/session</label>
          <input type="number" min="0" step="5" value={extraRate} onChange={e => setExtraRate(parseInt(e.target.value)||0)} />
        </div>
      </div>
      <div style={{marginBottom:14}}>
        <Toggle checked={extraCash} onChange={setExtraCash} label="Pay in cash" />
      </div>
      <div className="calc-grid">
        <div className="calc-grid-head"></div>
        <div className="calc-grid-head">Now</div>
        <div className="calc-grid-head">+{extra} more</div>
        <div className="calc-grid-head">New total</div>
        {rows.map(({ label, curr, add, isCount }) => (
          <React.Fragment key={label}>
            <div className="calc-grid-cell" style={{color:'var(--muted)'}}>{label}</div>
            <div className="calc-grid-cell">{isCount ? curr : fmt(curr)}</div>
            <div className="calc-grid-cell" style={{color:'var(--accent)'}}>+{isCount ? add : fmt(add)}</div>
            <div className="calc-grid-cell" style={{fontWeight:600}}>{isCount ? curr+add : fmt(curr+add)}</div>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

  const [form, setForm] = useState({
    name: student?.name || '',
    parent_name: student?.parent_name || '',
    parent_phone: student?.parent_phone || '',
    address: student?.address || '',
    school: student?.school || '',
    school_year: student?.school_year || '',
    exam_board_preset: initPreset,
    exam_board_custom: initPreset === 'other' ? existingBoard : '',
    exam_tier: student?.exam_tier || '',

    calendar_title_pattern: student?.calendar_title_pattern || '',

    referred_by_student_id: student?.referred_by_student_id || '',

  const [ratePerSession, setRatePerSession] = useState('');

  const [saving, setSaving] = useState(false);

  useEffect(() => {

        .lte('effective_from_date', today)
        .order('effective_from_date', { ascending: false })
        .limit(1)
        .single();
      if (data) {

        setRatePerSession(r.toString());

    fetchRate();
  }, []);

  async function handleSave() {

    };

    let studentId = student?.id;

    } else {
      const { data: newStudent } = await supabase.from('tutoring_students').insert(payload).select().single();
      studentId = newStudent?.id;
    }

    const rateNum = parseFloat(ratePerSession);
    if (studentId && ratePerSession && !isNaN(rateNum) && rateNum !== originalRate) {
      await supabase.from('tutoring_rate_history').insert({
        student_id: studentId,

        <div className="field">

            <Toggle checked={form.pays_in_cash} onChange={v => setForm({...form, pays_in_cash: v})} label="Cash" />

function CashPaymentModal({ student, upcomingLessons, onClose, onSaved }) {
  const [datePaid, setDatePaid] = useState(new Date().toISOString().slice(0, 10));
  const [numSessions, setNumSessions] = useState(1);
  const [selectedLessonIds, setSelectedLessonIds] = useState([]);
  const [rate, setRate] = useState(90);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    setSelectedLessonIds(upcomingLessons.slice(0, numSessions).map(l => l.id));
  }, [numSessions]);

  useEffect(() => {
    async function fetchRate() {
      const today = new Date().toISOString().slice(0, 10);
      const { data } = await supabase
        .from('tutoring_rate_history')
        .select('rate')
        .eq('student_id', student.id)
        .lte('effective_from_date', today)
        .order('effective_from_date', { ascending: false })
        .limit(1)
        .single();
      if (data) setRate(parseFloat(data.rate));
    }
    fetchRate();
  }, [student.id]);

  async function handleSave() {
    setSaving(true);
    const amount = rate * numSessions;

    const { data: bundle } = await supabase.from('tutoring_bundles').insert({
      student_id: student.id,
      number_of_sessions: numSessions,
      payment_timing: 'prepaid',
      rate_per_session: rate,
      total_cost: amount,
      date_created: datePaid,
      notes: 'Cash payment logged via app'
    }).select().single();

    await supabase.from('tutoring_payments').insert({
      student_id: student.id,
      bundle_id: bundle?.id,
      amount: amount,
      date_paid: datePaid,
      method: 'cash'
    });

    if (bundle && selectedLessonIds.length > 0) {
      for (const lessonId of selectedLessonIds) {
        await supabase.from('tutoring_lessons').update({ bundle_id: bundle.id }).eq('id', lessonId);
      }
    }

    setSaving(false);
    onSaved();
  }

  return (
    <div className="overlay" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="sheet">
        <h2>Track cash payment — {student.name}</h2>

        <div className="field">
          <label>Date paid</label>
          <input type="date" value={datePaid} onChange={e => setDatePaid(e.target.value)} />
        </div>
        <div className="field">
          <label>Number of sessions this covers</label>
          <input type="number" min="1" value={numSessions} onChange={e => setNumSessions(parseInt(e.target.value) || 1)} />
          <div style={{fontSize: '0.78rem', color: 'var(--muted)', marginTop: 4}}>
            Rate: £{rate}/session · Total: £{(rate * numSessions).toFixed(2)}
          </div>
        </div>

        {upcomingLessons.length > 0 ? (
          <div className="field">
            <label>Sessions this payment covers (pre-filled from calendar — untick any that don't apply)</label>
            <div className="session-list">
              {upcomingLessons.slice(0, Math.max(numSessions, 5)).map(l => (
                <div className="session-pick-row" key={l.id}>
                  <input
                    type="checkbox"
                    checked={selectedLessonIds.includes(l.id)}
                    onChange={e => {
                      if (e.target.checked) setSelectedLessonIds([...selectedLessonIds, l.id]);
                      else setSelectedLessonIds(selectedLessonIds.filter(id => id !== l.id));
                    }}
                  />
                  <span>{new Date(l.lesson_date).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' })}</span>
                </div>
              ))}
            </div>
            <div style={{fontSize: '0.78rem', color: 'var(--muted)'}}>
              As each date passes, the calendar sync will mark it completed automatically.
            </div>
          </div>
        ) : (
          <div style={{fontSize: '0.85rem', color: 'var(--muted)', margin: '10px 0'}}>
            No upcoming scheduled lessons found for this student — sessions can be matched up later once they're on the calendar.
          </div>
        )}

        <div className="btn-row">
          <button className="btn cancel" onClick={onClose}>Cancel</button>
          <button className="btn save" onClick={handleSave} disabled={saving}>
            {saving ? 'Saving…' : 'Save payment'}
          </button>
        </div>
      </div>
    </div>
  );
}

function groupByMonth(lessons) {
  const groups = {};
  lessons.forEach(l => {
    const key = l.lesson_date.slice(0, 7);
    if (!groups[key]) {
      const d = new Date(l.lesson_date + 'T12:00:00');
      groups[key] = { key, label: d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' }), lessons: [] };
    }
    groups[key].lessons.push(l);
  });
  return Object.values(groups).sort((a, b) => b.key.localeCompare(a.key));
}

function StudentCard({ student, lessons, payments, bundles, allStudents, rateHistory, onEdit, onDataChanged }) {
  const [open, setOpen] = useState(false);
  const [notesOpen, setNotesOpen] = useState(false);
  const [showMoreTools, setShowMoreTools] = useState(false);
  const [showCashModal, setShowCashModal] = useState(false);
  const [openMonths, setOpenMonths] = useState({});
  const [detailLesson, setDetailLesson] = useState(null);
  const [toggling, setToggling] = useState(false);

  const studentLessons = lessons.filter(l => l.student_id === student.id)
    .sort((a, b) => new Date(b.lesson_date) - new Date(a.lesson_date));
  const studentPayments = payments.filter(p => p.student_id === student.id);
  const studentBundles = bundles.filter(b => b.student_id === student.id);

  const upcomingLessons = studentLessons.filter(l => l.status === 'scheduled')
    .sort((a, b) => new Date(a.lesson_date) - new Date(b.lesson_date));

  const completedLessons = studentLessons.filter(l => l.status === 'completed');
  const totalOwed = completedLessons
    .filter(l => !l.is_complimentary)
    .reduce((sum, l) => sum + (parseFloat(l.rate_charged) || 0), 0);
  const totalPaid = studentPayments.reduce((sum, p) => sum + parseFloat(p.amount), 0);
  const balance = totalOwed - totalPaid;

  const lastPaymentDate = studentPayments.length > 0
    ? studentPayments.sort((a, b) => new Date(b.date_paid) - new Date(a.date_paid))[0].date_paid
    : null;

  const daysSinceLastPayment = lastPaymentDate ? daysBetween(lastPaymentDate) : null;
  const isOverdue = balance > 0 && (daysSinceLastPayment === null || daysSinceLastPayment > 2);

  const nextLesson = upcomingLessons[0];

  const activeBundle = studentBundles.find(b => {
    const used = studentLessons.filter(l => l.bundle_id === b.id && l.status === 'completed').length;
    return used < b.number_of_sessions;
  });

  let bundleRemaining = null;
  if (activeBundle) {
    const used = studentLessons.filter(l => l.bundle_id === activeBundle.id && l.status === 'completed').length;
    bundleRemaining = activeBundle.number_of_sessions - used;
  }

  async function toggleComplimentary(lesson) {
    setToggling(true);
    await supabase.from('tutoring_lessons').update({ is_complimentary: !lesson.is_complimentary }).eq('id', lesson.id);
    setToggling(false);
    setDetailLesson(null);
    onDataChanged();
  }

  async function archiveStudent() {
    await supabase.from('tutoring_students').update({ active: false }).eq('id', student.id);
    setShowMoreTools(false);
    onDataChanged();
  }

  const displayYear = currentSchoolYear(student.school_year, student.school_year_as_of_date);
  const referredBy = student.referred_by_student_id ? allStudents.find(s => s.id === student.referred_by_student_id) : null;
  const referrals = allStudents.filter(s => s.referred_by_student_id === student.id);

  const currentRate = getCurrentRate(student.id, rateHistory);
  const unpaidCount = balance > 0 && currentRate > 0 ? Math.ceil(balance / currentRate) : 0;

  const sixMonthsOut = new Date();
  sixMonthsOut.setMonth(sixMonthsOut.getMonth() + 6);
  const sixMonthsOutStr = sixMonthsOut.toISOString().slice(0, 10);
  const upcomingNext6 = upcomingLessons.filter(l => l.lesson_date <= sixMonthsOutStr);
  const pastLessons = studentLessons
    .filter(l => l.status !== 'scheduled')
    .slice(0, Math.max(10, unpaidCount));

  const groupedLessons = groupByMonth(pastLessons);
  const isMonthOpen = key => key in openMonths ? openMonths[key] : (groupedLessons.length > 0 && groupedLessons[0].key === key);

  const studentFirstName = student.name.split(' ')[0];
  const parentFirstName = (student.parent_name || '').split(' ')[0];
  const greeting = parentFirstName ? `Hi ${parentFirstName}!` : 'Hi!';
  const phone = normaliseUKPhone(student.parent_phone);
  const waMessage = balance > 0
    ? `${greeting} Just a friendly reminder we have an outstanding balance of £${balance.toFixed(2)} for ${studentFirstName}'s maths lessons. Let me know when's good to sort payment. Thanks!`
    : `${greeting} Just checking in about ${studentFirstName}'s next maths lesson.`;
  const waLink = phone ? `https://wa.me/${phone}?text=${encodeURIComponent(waMessage)}` : null;
  const paymentMsg = `${greeting} Just a note that we have ${unpaidCount} outstanding session${unpaidCount !== 1 ? 's' : ''} totalling £${balance.toFixed(2)}. Could you let me know when's convenient to settle up? Thanks!`;
  const paymentWaLink = phone && balance > 0 ? `https://wa.me/${phone}?text=${encodeURIComponent(paymentMsg)}` : null;
  const bundleMsg = bundleRemaining !== null ? `${greeting} Just to let you know, there's ${bundleRemaining} session${bundleRemaining !== 1 ? 's' : ''} left in ${studentFirstName}'s current bundle. When you get a chance, it'd be great to sort another bundle. Thanks!` : '';
  const bundleWaLink = phone && bundleRemaining !== null && bundleRemaining <= 1 ? `https://wa.me/${phone}?text=${encodeURIComponent(bundleMsg)}` : null;

  return (
    <div className="card">
      <div className="card-header" onClick={() => setOpen(!open)}>
        <div>
          <div className="student-name">{student.name}{!student.active && ' (inactive)'}</div>
          <div className="status-row">
            {balance > 0 && (
              <span className={`pill ${isOverdue ? 'warn' : 'neutral'}`}>
                {isOverdue ? `Overdue £${balance.toFixed(2)}` : `Owes £${balance.toFixed(2)}`}
              </span>
            )}
            {balance <= 0 && <span className="pill ok">Paid up</span>}
            {bundleRemaining !== null && bundleRemaining <= 1 && (
              <span className="pill warn">{bundleRemaining} session left</span>
            )}
            {nextLesson && (
              <span className="pill neutral">Next: {new Date(nextLesson.lesson_date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}</span>
            )}
            {displayYear && <span className="pill neutral">Y{displayYear}</span>}
            <span className="pill neutral">£{currentRate}</span>
            {student.is_zoom && <span className="pill neutral">Zoom</span>}
          </div>
        </div>
        <span className={`chevron ${open ? 'open' : ''}`}>›</span>
      </div>

      <div className={`card-body${open ? ' open' : ''}`}>
      <div className="card-body-inner">
          {(student.school || displayYear || referredBy || referrals.length > 0) && (
            <React.Fragment>
              <div className="section-label">Details</div>
              {(student.school || displayYear) && (
                <div style={{ fontSize: '0.85rem', color: 'var(--ink-dim)', marginBottom: 4 }}>
                  {student.school}{displayYear ? `, Year ${displayYear}` : ''}{student.exam_board ? ` · ${student.exam_board}` : ''}{student.exam_tier && student.exam_tier !== 'not_sure' ? ` (${student.exam_tier})` : ''}
                </div>
              )}
              {displayYear && student.school_year && (() => {
                const now = new Date();
                const thisAug = new Date(now.getFullYear(), 7, 1);
                const nextAug = now < thisAug ? thisAug : new Date(now.getFullYear() + 1, 7, 1);
                const nextDisplayYear = Math.min(displayYear + 1, 13);
                const daysToUpdate = Math.ceil((nextAug - now) / 86400000);
                const startedLabel = student.school_year !== displayYear ? ` · started Y${student.school_year}` : '';
                const updateLabel = nextDisplayYear <= 13 ? ` · Y${nextDisplayYear} in ${daysToUpdate}d` : '';
                return <div style={{fontSize:'0.76rem', color:'var(--muted)', marginBottom:4}}>{`Y${displayYear}${startedLabel}${updateLabel}`}</div>;
              })()}
              {referredBy && (
                <div style={{ fontSize: '0.82rem', color: 'var(--muted)' }}>Referred by {referredBy.name.split(' ')[0]}</div>
              )}
              {referrals.length > 0 && (
                <div style={{ fontSize: '0.82rem', color: 'var(--accent)', marginTop: 2 }}>
                  Referred {referrals.map(s => s.name.split(' ')[0]).join(', ')} — use "mark free" on their next lesson
                </div>
              )}
            </React.Fragment>
          )}

          {upcomingNext6.length > 0 && (
            <>
              <div className="section-label">Upcoming</div>
              {upcomingNext6.map(l => (
                <div className="lesson-row" key={l.id}>
                  <span className="lesson-date">{new Date(l.lesson_date).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' })}</span>
                  <span className="lesson-status scheduled">{l.bundle_id ? 'prepaid' : 'scheduled'}</span>
                </div>
              ))}
            </>
          )}

          <div className="section-label">History</div>
          {groupedLessons.length === 0 && (
            <div style={{fontSize:'0.85rem',color:'var(--muted)',padding:'6px 0'}}>No lessons logged yet.</div>
          )}
          {groupedLessons.map(group => (
            <React.Fragment key={group.key}>
              <div className="month-hdr" onClick={() => setOpenMonths(prev => ({...prev, [group.key]: !isMonthOpen(group.key)}))}>
                <span style={{fontSize:'0.83rem',fontWeight:600,color:'var(--ink)'}}>{group.label}</span>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:'0.72rem',color:'var(--muted)'}}>{group.lessons.length} lesson{group.lessons.length !== 1 ? 's' : ''}</span>
                  <span className="month-chevron" style={{transform:isMonthOpen(group.key)?'rotate(90deg)':'none'}}>›</span>
                </div>
              </div>
              {isMonthOpen(group.key) && group.lessons.map(l => (
                <div className="lesson-row" key={l.id} onClick={() => setDetailLesson(l)}>
                  <span className="lesson-date">{new Date(l.lesson_date + 'T12:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short' })}</span>
                  <span className={`lesson-status ${l.is_complimentary ? '' : l.status}`} style={l.is_complimentary ? {color:'var(--accent)'} : {}}>
                    {l.is_complimentary ? 'free' : (l.status + (l.rate_charged ? ` · £${l.rate_charged}` : ''))}
                  </span>
                </div>
              ))}
            </React.Fragment>
          ))}

          <div className="actions">
            {paymentWaLink && <a className="btn whatsapp" href={paymentWaLink} target="_blank" rel="noopener">💷 Request payment</a>}
            {bundleWaLink && <a className="btn" href={bundleWaLink} target="_blank" rel="noopener" style={{background:'#128C7E'}}>🔔 Bundle low</a>}
            {waLink && <a className="btn whatsapp" href={waLink} target="_blank" rel="noopener">WhatsApp</a>}
            {student.spreadsheet_url && (
              <a className="btn" href={student.spreadsheet_url} target="_blank" rel="noopener" style={{background:'#1a7f4b', flex:'0 0 auto', minWidth:'auto', padding:'10px 14px'}}>📈</a>
            )}
            {student.is_zoom && student.zoom_link && (
              <a className="btn" href={student.zoom_link} target="_blank" rel="noopener" style={{background:'#2D8CFF', flex:'0 0 auto', minWidth:'auto', padding:'10px 14px'}}>🎥</a>
            )}
            <button className="btn edit" onClick={() => onEdit(student)}>Edit</button>
            <button className="btn more" onClick={() => setShowMoreTools(true)}>More tools</button>
            {student.general_notes && (
              <button className="btn notes" onClick={() => setNotesOpen(!notesOpen)}>
                {notesOpen ? 'Hide notes' : 'Notes'}
              </button>
            )}
          </div>

          {student.general_notes && (
            <div className={`notes-box ${notesOpen ? 'visible' : ''}`}>{student.general_notes}</div>
          )}
        </div>
      </div>

      {showMoreTools && (
        <MoreToolsSheet
          student={student}
          onClose={() => setShowMoreTools(false)}
          onTrackCash={() => { setShowMoreTools(false); setShowCashModal(true); }}
          onArchive={archiveStudent}
        />
      )}

      {showCashModal && (
        <CashPaymentModal
          student={student}
          upcomingLessons={upcomingLessons}
          onClose={() => setShowCashModal(false)}
          onSaved={() => { setShowCashModal(false); onDataChanged(); }}
        />
      )}

      {detailLesson && (
        <LessonDetailSheet
          lesson={detailLesson}
          onClose={() => setDetailLesson(null)}
          onToggleFree={() => toggleComplimentary(detailLesson)}
          toggling={toggling}
        />
      )}
    </div>
  );
}

function App() {
  const [students, setStudents] = useState([]);
  const [lessons, setLessons] = useState([]);
  const [payments, setPayments] = useState([]);
  const [bundles, setBundles] = useState([]);
  const [rateHistory, setRateHistory] = useState([]);
  const [loading, setLoading] = useState(true);
  const [refreshing, setRefreshing] = useState(false);
  const [lastSynced, setLastSynced] = useState(null);
  const [showAddModal, setShowAddModal] = useState(false);
  const [editingStudent, setEditingStudent] = useState(null);
  const [showGlobalTools, setShowGlobalTools] = useState(false);

  async function loadAll(isManualRefresh = false) {
    if (isManualRefresh) setRefreshing(true);
    // Auto-fix past scheduled lessons
    const today = new Date().toISOString().slice(0, 10);
    supabase.from('tutoring_lessons').update({ status: 'completed' })
      .eq('status', 'scheduled').lt('lesson_date', today).then(() => {});
    const [s, l, p, b, r] = await Promise.all([
      supabase.from('tutoring_students').select('*').order('active', { ascending: false }).order('name'),
      supabase.from('tutoring_lessons').select('*'),
      supabase.from('tutoring_payments').select('*'),
      supabase.from('tutoring_bundles').select('*'),
      supabase.from('tutoring_rate_history').select('*')
    ]);
    setStudents(s.data || []);
    setLessons(l.data || []);
    setPayments(p.data || []);
    setBundles(b.data || []);
    setRateHistory(r.data || []);
    setLastSynced(new Date());
    setLoading(false);
    setRefreshing(false);
  }

  useEffect(() => { loadAll(); }, []);

  const activeStudents = students.filter(s => s.active);
  const archivedCount = students.filter(s => !s.active).length;

  const syncLabel = lastSynced
    ? `synced ${lastSynced.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })}`
    : '';

  return (
    <div>
      <div className="app-header">
        <div className="header-row">
          <div>
            <div className="header-title">Maths Tutoring</div>
            <div className="header-sub">
              {activeStudents.length} active{archivedCount > 0 ? ` · ${archivedCount} archived` : ''}{syncLabel ? ` · ${syncLabel}` : ''}
            </div>
          </div>
          <div className="header-right">
            <button className="refresh-btn" onClick={() => loadAll(true)} disabled={refreshing}>
              <span style={{display:'inline-block', animation: refreshing ? 'spin 0.8s linear infinite' : 'none'}}>↻</span>
            </button>
            <button className="add-btn" onClick={() => setShowAddModal(true)}>+ Add</button>
          </div>
        </div>
      </div>

      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>

      <div className="content">
        {!loading && <SummaryWidget students={students} rateHistory={rateHistory} />}

        {loading && <div className="loading">Loading…</div>}

        {!loading && activeStudents.length === 0 && (
          <div className="empty">No active students. Tap "+ Add" to get started.</div>
        )}

        {!loading && activeStudents.map(s => (
          <StudentCard key={s.id} student={s} lessons={lessons} payments={payments} bundles={bundles}
            allStudents={students} rateHistory={rateHistory} onEdit={setEditingStudent} onDataChanged={loadAll} />
        ))}

        {!loading && <div className="version-tag">v1.5</div>}
      </div>

      {showAddModal && (
        <StudentFormModal
          allStudents={students}
          onClose={() => setShowAddModal(false)}
          onSaved={() => { setShowAddModal(false); loadAll(); }}
        />
      )}

      <button className="global-tools-btn" onClick={() => setShowGlobalTools(true)}>⚙ Tools</button>

      {showGlobalTools && (
        <GlobalToolsSheet students={students} rateHistory={rateHistory} onClose={() => setShowGlobalTools(false)} onDataChanged={loadAll} />
      )}

      {editingStudent && (
        <StudentFormModal
          student={editingStudent}
          allStudents={students}
          onClose={() => setEditingStudent(null)}
          onSaved={() => { setEditingStudent(null); loadAll(); }}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
