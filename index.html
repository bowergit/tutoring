<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutoring — Bower OS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --ink: #1a1a1a; 
    --paper: #faf9f7;
    --card: #ffffff;
    --line: #e4e2de;
    --accent: #2f5233;
    --accent-light: #e8f0e9;
    --warn: #b3532a;
    --warn-light: #fbeee6;
    --muted: #6b6862;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--paper);
    color: var(--ink);
  }
  #root { max-width: 720px; margin: 0 auto; padding: 16px; padding-bottom: 80px; }
  h1 { font-size: 1.4rem; margin: 8px 0 4px; }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
  .add-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .card-header {
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
  }
  .card-header:active { background: #f5f4f1; }
  .student-name { font-weight: 600; font-size: 1.02rem; }
  .status-row { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .pill {
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .pill.ok { background: var(--accent-light); color: var(--accent); }
  .pill.warn { background: var(--warn-light); color: var(--warn); }
  .pill.neutral { background: #f0efec; color: var(--muted); }
  .chevron { font-size: 1.2rem; color: var(--muted); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); }
  .chevron.open { transform: rotate(90deg); }
  .card-body {
    padding: 0 16px;
    border-top: 1px solid var(--line);
    overflow: hidden;
    max-height: 0;
    padding-bottom: 0;
    transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), padding-bottom 0.25s;
  }
  .card-body.open {
    max-height: 2400px;
    padding-bottom: 16px;
  }
  .section-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin: 14px 0 6px;
  }
  .lesson-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 0.88rem;
    border-bottom: 1px solid #f0efec;
  }
  .lesson-row:last-child { border-bottom: none; }
  .lesson-date { color: var(--muted); }
  .lesson-status { font-size: 0.78rem; }
  .lesson-status.completed { color: var(--accent); }
  .lesson-status.scheduled { color: var(--muted); }
  .lesson-status.missed { color: var(--warn); }
  .actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .btn {
    flex: 1;
    min-width: 100px;
    padding: 10px 12px;
    border-radius: 8px;
    border: none;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    color: white;
  }
  .btn.whatsapp { background: #25D366; }
  .btn.notes { background: var(--muted); }
  .btn.more { background: #3a3a3a; }
  .btn.edit { background: #8a8578; }
  .notes-box {
    font-size: 0.85rem;
    color: #444;
    background: #f7f6f4;
    padding: 10px 12px;
    border-radius: 8px;
    margin-top: 8px;
    line-height: 1.4;
    display: none;
  }
  .notes-box.visible { display: block; }
  .empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 0.9rem; }
  .loading { text-align: center; color: var(--muted); padding: 40px 20px; }

  /* Modal / sheet */
  @keyframes overlayIn { from { background: rgba(0,0,0,0); } to { background: rgba(0,0,0,0.4); } }
  @keyframes sheetUp { from { transform: translateY(48px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100;
    animation: overlayIn 0.2s ease forwards;
  }
  .sheet {
    background: var(--card);
    width: 100%; max-width: 720px;
    border-radius: 16px 16px 0 0;
    padding: 20px;
    max-height: 88vh;
    overflow-y: auto;
    animation: sheetUp 0.28s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  .sheet h2 { font-size: 1.15rem; margin: 0 0 16px; }
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 0.78rem; color: var(--muted);
    margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .field input[type="text"], .field input[type="date"], .field input[type="number"], .field select, .field textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--line);
    border-radius: 8px; font-size: 0.95rem; font-family: inherit; background: #fff;
  }
  .field textarea { min-height: 70px; resize: vertical; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; }
  .checkbox-row input { width: 18px; height: 18px; }
  .btn-row { display: flex; gap: 10px; margin-top: 18px; }
  .btn-row .btn { color: white; }
  .btn.cancel { background: #ddd; color: #333; }
  .btn.save { background: var(--accent); }
  .session-list { margin: 10px 0; }
  .session-pick-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid #f0efec; font-size: 0.9rem;
  }
  .session-pick-row input { width: 18px; height: 18px; }
  .tools-menu {
    display: flex; flex-direction: column; gap: 8px; margin-top: 4px;
  }
  .tools-menu button {
    text-align: left; padding: 12px 14px; border-radius: 8px;
    border: 1px solid var(--line); background: #fff; font-size: 0.9rem; cursor: pointer;
  }
  .global-tools-btn {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: white; border: none; border-radius: 24px;
    padding: 12px 28px; font-size: 0.9rem; font-weight: 600; cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.22); z-index: 50; white-space: nowrap;
  }
  .calc-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 0; font-size: 0.82rem; }
  .calc-grid-cell { padding: 6px 4px; border-top: 1px solid #f0efec; }
  .calc-grid-head { padding: 0 4px 6px; font-size: 0.72rem; color: var(--muted); }
  .free-btn {
    font-size: 0.68rem; padding: 2px 7px; border-radius: 10px;
    border: 1px solid var(--line); cursor: pointer; white-space: nowrap;
  }
  .free-btn.active { background: var(--accent-light); color: var(--accent); border-color: var(--accent-light); }
  .free-btn.inactive { background: #f0efec; color: var(--muted); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const SUPABASE_URL = 'https://uilytgubukiinyrqrltj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_WK5p8tUAsNLEqnmxVT7Eag_2EVNbi7V';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function daysBetween(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  return Math.floor((now - d) / (1000 * 60 * 60 * 24));
}

function currentSchoolYear(baseYear, asOfDate) {
  if (baseYear == null || !asOfDate) return null;
  const ref = new Date(asOfDate);
  const now = new Date();
  let bumps = 0;
  let cursor = new Date(ref.getFullYear(), 7, 1); // 1 August of ref's year
  if (ref >= cursor) cursor.setFullYear(cursor.getFullYear() + 1);
  while (cursor <= now) {
    bumps++;
    cursor.setFullYear(cursor.getFullYear() + 1);
  }
  return Math.min(baseYear + bumps, 13);
}

const PRESET_BOARDS = ['Edexcel', 'AQA', 'Edexcel IGCSE', 'OCR'];

function getCurrentRate(studentId, rateHistory, fallback = 90) {
  const today = new Date().toISOString().slice(0, 10);
  const rows = (rateHistory || [])
    .filter(r => r.student_id === studentId && r.effective_from_date <= today)
    .sort((a, b) => b.effective_from_date.localeCompare(a.effective_from_date));
  return rows.length > 0 ? parseFloat(rows[0].rate) : fallback;
}

// ---------- Summary Widget ----------
function SummaryWidget({ students, rateHistory }) {
  const active = students.filter(s => s.active);
  if (active.length === 0) return null;

  const weeklyGross = active.reduce((sum, s) => sum + getCurrentRate(s.id, rateHistory), 0);
  const annualGross = weeklyGross * 40;

  // Cash students: full rate is take-home. Non-cash: 60% after 40% tax.
  const weeklyNet = active.reduce((sum, s) => {
    const rate = getCurrentRate(s.id, rateHistory);
    return sum + (s.pays_in_cash ? rate : rate * 0.6);
  }, 0);
  const annualNet = weeklyNet * 40;

  const fmt = n => n >= 1000 ? `£${(n / 1000).toFixed(1)}k` : `£${Math.round(n)}`;

  const stats = [
    { label: 'students',   value: active.length,            accent: false },
    { label: 'gross/week', value: fmt(weeklyGross),          accent: false },
    { label: 'net/week',   value: fmt(weeklyNet),            accent: true  },
    { label: 'gross/year', value: fmt(annualGross),          accent: false },
    { label: 'net/year',   value: fmt(annualNet),            accent: true  },
  ];

  return (
    <div style={{background:'var(--card)',border:'1px solid var(--line)',borderRadius:12,padding:'14px 16px',marginBottom:16}}>
      <div style={{fontSize:'0.72rem',textTransform:'uppercase',letterSpacing:'0.05em',color:'var(--muted)',marginBottom:10}}>Weekly snapshot</div>
      <div style={{display:'flex',gap:0,flexWrap:'wrap'}}>
        {stats.map(({label, value, accent}) => (
          <div key={label} style={{flex:'1 1 80px',minWidth:70,marginBottom:8}}>
            <div style={{fontSize:'1.3rem',fontWeight:700,color:accent?'var(--accent)':'var(--ink)'}}>{value}</div>
            <div style={{fontSize:'0.72rem',color:'var(--muted)'}}>{label}</div>
          </div>
        ))}
      </div>
      <div style={{fontSize:'0.72rem',color:'var(--muted)',borderTop:'1px solid var(--line)',paddingTop:8,marginTop:4}}>
        40 lessons/year per student · cash = full rate · bank transfer = 60% after tax
      </div>
    </div>
  );
}

function normaliseUKPhone(raw) {
  const digits = (raw || '').replace(/\D/g, '');
  if (!digits) return '';
  if (digits.startsWith('44')) return digits;
  if (digits.startsWith('0')) return '44' + digits.slice(1);
  return '44' + digits;
}

// ---------- Growth Calculator ----------
function GrowthCalculator({ students, rateHistory }) {
  const active = students.filter(s => s.active);
  const avgRate = active.length > 0
    ? Math.round(active.reduce((sum, s) => sum + getCurrentRate(s.id, rateHistory), 0) / active.length)
    : 90;

  const [extra, setExtra] = useState(4);
  const [extraRate, setExtraRate] = useState(avgRate);
  const [extraCash, setExtraCash] = useState(false);

  const currGrossW = active.reduce((sum, s) => sum + getCurrentRate(s.id, rateHistory), 0);
  const currNetW   = active.reduce((sum, s) => {
    const r = getCurrentRate(s.id, rateHistory);
    return sum + (s.pays_in_cash ? r : r * 0.6);
  }, 0);
  const addGrossW = extra * extraRate;
  const addNetW   = extra * extraRate * (extraCash ? 1 : 0.6);

  const fmt = n => n >= 1000 ? `£${(n / 1000).toFixed(1)}k` : `£${Math.round(n)}`;

  const rows = [
    { label: 'Students',  curr: active.length,    add: extra,      isCount: true },
    { label: 'Gross/wk', curr: currGrossW,        add: addGrossW  },
    { label: 'Net/wk',   curr: currNetW,          add: addNetW    },
    { label: 'Gross/yr', curr: currGrossW * 40,   add: addGrossW * 40 },
    { label: 'Net/yr',   curr: currNetW * 40,     add: addNetW * 40   },
  ];

  return (
    <div>
      <div style={{display:'flex', gap:10, marginBottom:12}}>
        <div className="field" style={{flex:1, marginBottom:0}}>
          <label>Extra students</label>
          <input type="number" min="1" value={extra} onChange={e => setExtra(parseInt(e.target.value)||1)} />
        </div>
        <div className="field" style={{flex:1, marginBottom:0}}>
          <label>Rate £/session</label>
          <input type="number" min="0" step="5" value={extraRate} onChange={e => setExtraRate(parseInt(e.target.value)||0)} />
        </div>
      </div>
      <div className="checkbox-row" style={{marginBottom:14}}>
        <input type="checkbox" checked={extraCash} onChange={e => setExtraCash(e.target.checked)} />
        <label style={{marginBottom:0, fontSize:'0.88rem'}}>Pay in cash</label>
      </div>
      <div className="calc-grid">
        <div className="calc-grid-head"></div>
        <div className="calc-grid-head">Now</div>
        <div className="calc-grid-head">+{extra} more</div>
        <div className="calc-grid-head">New total</div>
        {rows.map(({ label, curr, add, isCount }) => (
          <React.Fragment key={label}>
            <div className="calc-grid-cell" style={{color:'var(--muted)'}}>{label}</div>
            <div className="calc-grid-cell">{isCount ? curr : fmt(curr)}</div>
            <div className="calc-grid-cell" style={{color:'var(--accent)'}}>+{isCount ? add : fmt(add)}</div>
            <div className="calc-grid-cell" style={{fontWeight:600}}>{isCount ? curr+add : fmt(curr+add)}</div>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

// ---------- Global Tools Sheet ----------
function GlobalToolsSheet({ students, rateHistory, onClose }) {
  const [tool, setTool] = useState(null);
  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="sheet">
        {!tool && (
          <>
            <h2>Tools</h2>
            <div className="tools-menu">
              <button onClick={() => setTool('growth')}>📈 Growth calculator — what if I had more students?</button>
            </div>
          </>
        )}
        {tool === 'growth' && (
          <>
            <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:16}}>
              <button style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:'1.1rem',padding:0}} onClick={() => setTool(null)}>←</button>
              <h2 style={{margin:0}}>Growth calculator</h2>
            </div>
            <GrowthCalculator students={students} rateHistory={rateHistory} />
          </>
        )}
        <div className="btn-row">
          <button className="btn cancel" onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

// ---------- Add/Edit Student Modal ----------
function StudentFormModal({ student, onClose, onSaved }) {
  const isEdit = !!student;
  const existingBoard = student?.exam_board || '';
  const initPreset = PRESET_BOARDS.includes(existingBoard) ? existingBoard : (existingBoard ? 'other' : '');

  const [form, setForm] = useState({
    name: student?.name || '',
    parent_name: student?.parent_name || '',
    parent_phone: student?.parent_phone || '',
    address: student?.address || '',
    school: student?.school || '',
    school_year: student?.school_year || '',
    exam_board_preset: initPreset,
    exam_board_custom: initPreset === 'other' ? existingBoard : '',
    exam_tier: student?.exam_tier || '',
    has_extra_time: student?.has_extra_time || false,
    pays_in_cash: student?.pays_in_cash || false,
    general_notes: student?.general_notes || '',
    calendar_title_pattern: student?.calendar_title_pattern || '',
    active: student?.active !== undefined ? student.active : true,
  });
  const [ratePerSession, setRatePerSession] = useState('');
  const [originalRate, setOriginalRate] = useState(null);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    if (!isEdit || !student?.id) return;
    async function fetchRate() {
      const today = new Date().toISOString().slice(0, 10);
      const { data } = await supabase
        .from('tutoring_rate_history')
        .select('rate')
        .eq('student_id', student.id)
        .lte('effective_from_date', today)
        .order('effective_from_date', { ascending: false })
        .limit(1)
        .single();
      if (data) {
        const r = parseFloat(data.rate);
        setRatePerSession(r.toString());
        setOriginalRate(r);
      }
    }
    fetchRate();
  }, []);

  async function handleSave() {
    setSaving(true);
    const exam_board = form.exam_board_preset === 'other'
      ? form.exam_board_custom
      : form.exam_board_preset;
    const payload = {
      name: form.name,
      parent_name: form.parent_name,
      parent_phone: form.parent_phone,
      address: form.address,
      school: form.school,
      school_year: form.school_year ? parseInt(form.school_year) : null,
      school_year_as_of_date: form.school_year ? new Date().toISOString().slice(0, 10) : null,
      exam_board: exam_board || null,
      exam_tier: form.exam_tier || null,
      has_extra_time: form.has_extra_time,
      pays_in_cash: form.pays_in_cash,
      general_notes: form.general_notes,
      calendar_title_pattern: form.calendar_title_pattern,
      active: form.active,
    };

    let studentId = student?.id;
    if (isEdit) {
      await supabase.from('tutoring_students').update(payload).eq('id', student.id);
    } else {
      const { data: newStudent } = await supabase.from('tutoring_students').insert(payload).select().single();
      studentId = newStudent?.id;
    }

    const rateNum = parseFloat(ratePerSession);
    if (studentId && ratePerSession && !isNaN(rateNum) && rateNum !== originalRate) {
      await supabase.from('tutoring_rate_history').insert({
        student_id: studentId,
        rate: rateNum,
        effective_from_date: new Date().toISOString().slice(0, 10),
      });
    }

    setSaving(false);
    onSaved();
  }

  return (
    <div className="overlay" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="sheet">
        <h2>{isEdit ? 'Edit student' : 'Add student'}</h2>

        <div className="field">
          <label>Name</label>
          <input type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
        </div>
        <div className="field">
          <label>Parent name</label>
          <input type="text" value={form.parent_name} onChange={e => setForm({...form, parent_name: e.target.value})} />
        </div>
        <div className="field">
          <label>Parent's mobile number</label>
          <input type="text" value={form.parent_phone} onChange={e => setForm({...form, parent_phone: e.target.value})} placeholder="07700 900000" />
        </div>
        <div className="field">
          <label>Address</label>
          <input type="text" value={form.address} onChange={e => setForm({...form, address: e.target.value})} />
        </div>
        <div className="field">
          <label>School</label>
          <input type="text" value={form.school} onChange={e => setForm({...form, school: e.target.value})} />
        </div>
        <div className="field">
          <label>Rate per session (£)</label>
          <input type="number" min="0" step="5" value={ratePerSession} onChange={e => setRatePerSession(e.target.value)} placeholder="e.g. 90" />
        </div>
        <div className="field">
          <label>School year (7–13, as of today)</label>
          <input type="number" min="7" max="13" value={form.school_year} onChange={e => setForm({...form, school_year: e.target.value})} />
        </div>
        <div className="field">
          <label>Exam board</label>
          <select value={form.exam_board_preset} onChange={e => setForm({...form, exam_board_preset: e.target.value})}>
            <option value="">—</option>
            <option value="Edexcel">Edexcel</option>
            <option value="AQA">AQA</option>
            <option value="Edexcel IGCSE">Edexcel IGCSE</option>
            <option value="OCR">OCR</option>
            <option value="other">Other</option>
          </select>
          {form.exam_board_preset === 'other' && (
            <input type="text" style={{marginTop: 6}} value={form.exam_board_custom}
              onChange={e => setForm({...form, exam_board_custom: e.target.value})}
              placeholder="e.g. OCR, Cambridge" />
          )}
        </div>
        <div className="field">
          <label>Exam tier</label>
          <select value={form.exam_tier} onChange={e => setForm({...form, exam_tier: e.target.value})}>
            <option value="">—</option>
            <option value="foundation">Foundation</option>
            <option value="higher">Higher</option>
            <option value="not_sure">Not sure yet</option>
          </select>
        </div>
        <div className="field checkbox-row">
          <input type="checkbox" checked={form.has_extra_time} onChange={e => setForm({...form, has_extra_time: e.target.checked})} />
          <label style={{marginBottom: 0}}>Has extra time (25%)</label>
        </div>
        <div className="field checkbox-row">
          <input type="checkbox" checked={form.pays_in_cash} onChange={e => setForm({...form, pays_in_cash: e.target.checked})} />
          <label style={{marginBottom: 0}}>Pays in cash (take-home = full rate, no tax deducted)</label>
        </div>
        <div className="field">
          <label>Student's name in your calendar</label>
          <input type="text" value={form.calendar_title_pattern}
            onChange={e => setForm({...form, calendar_title_pattern: e.target.value})}
            placeholder="e.g. Saskia" />
          <div style={{fontSize: '0.78rem', color: 'var(--muted)', marginTop: 4}}>
            The word that appears in your Google Calendar event titles for this student's lessons.
          </div>
        </div>
        <div className="field">
          <label>Notes</label>
          <textarea value={form.general_notes} onChange={e => setForm({...form, general_notes: e.target.value})} />
        </div>
        <div className="field checkbox-row">
          <input type="checkbox" checked={form.active} onChange={e => setForm({...form, active: e.target.checked})} />
          <label style={{marginBottom: 0}}>Active student</label>
        </div>

        <div className="btn-row">
          <button className="btn cancel" onClick={onClose}>Cancel</button>
          <button className="btn save" onClick={handleSave} disabled={saving || !form.name}>
            {saving ? 'Saving…' : 'Save'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ---------- Cash Payment Modal ----------
function CashPaymentModal({ student, upcomingLessons, onClose, onSaved }) {
  const [datePaid, setDatePaid] = useState(new Date().toISOString().slice(0, 10));
  const [numSessions, setNumSessions] = useState(1);
  const [selectedLessonIds, setSelectedLessonIds] = useState([]);
  const [rate, setRate] = useState(90);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    setSelectedLessonIds(upcomingLessons.slice(0, numSessions).map(l => l.id));
  }, [numSessions]);

  useEffect(() => {
    async function fetchRate() {
      const today = new Date().toISOString().slice(0, 10);
      const { data } = await supabase
        .from('tutoring_rate_history')
        .select('rate')
        .eq('student_id', student.id)
        .lte('effective_from_date', today)
        .order('effective_from_date', { ascending: false })
        .limit(1)
        .single();
      if (data) setRate(parseFloat(data.rate));
    }
    fetchRate();
  }, [student.id]);

  async function handleSave() {
    setSaving(true);
    const amount = rate * numSessions;

    const { data: bundle } = await supabase.from('tutoring_bundles').insert({
      student_id: student.id,
      number_of_sessions: numSessions,
      payment_timing: 'prepaid',
      rate_per_session: rate,
      total_cost: amount,
      date_created: datePaid,
      notes: 'Cash payment logged via app'
    }).select().single();

    await supabase.from('tutoring_payments').insert({
      student_id: student.id,
      bundle_id: bundle?.id,
      amount: amount,
      date_paid: datePaid,
      method: 'cash'
    });

    if (bundle && selectedLessonIds.length > 0) {
      for (const lessonId of selectedLessonIds) {
        await supabase.from('tutoring_lessons').update({ bundle_id: bundle.id }).eq('id', lessonId);
      }
    }

    setSaving(false);
    onSaved();
  }

  return (
    <div className="overlay" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="sheet">
        <h2>Track cash payment — {student.name}</h2>

        <div className="field">
          <label>Date paid</label>
          <input type="date" value={datePaid} onChange={e => setDatePaid(e.target.value)} />
        </div>
        <div className="field">
          <label>Number of sessions this covers</label>
          <input type="number" min="1" value={numSessions} onChange={e => setNumSessions(parseInt(e.target.value) || 1)} />
          <div style={{fontSize: '0.78rem', color: 'var(--muted)', marginTop: 4}}>
            Rate: £{rate}/session · Total: £{(rate * numSessions).toFixed(2)}
          </div>
        </div>

        {upcomingLessons.length > 0 ? (
          <div className="field">
            <label>Sessions this payment covers (pre-filled from calendar — untick any that don't apply)</label>
            <div className="session-list">
              {upcomingLessons.slice(0, Math.max(numSessions, 5)).map(l => (
                <div className="session-pick-row" key={l.id}>
                  <input
                    type="checkbox"
                    checked={selectedLessonIds.includes(l.id)}
                    onChange={e => {
                      if (e.target.checked) setSelectedLessonIds([...selectedLessonIds, l.id]);
                      else setSelectedLessonIds(selectedLessonIds.filter(id => id !== l.id));
                    }}
                  />
                  <span>{new Date(l.lesson_date).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' })}</span>
                </div>
              ))}
            </div>
            <div style={{fontSize: '0.78rem', color: 'var(--muted)'}}>
              As each date passes, the calendar sync will mark it completed automatically.
            </div>
          </div>
        ) : (
          <div style={{fontSize: '0.85rem', color: 'var(--muted)', margin: '10px 0'}}>
            No upcoming scheduled lessons found for this student — sessions can be matched up later once they're on the calendar.
          </div>
        )}

        <div className="btn-row">
          <button className="btn cancel" onClick={onClose}>Cancel</button>
          <button className="btn save" onClick={handleSave} disabled={saving}>
            {saving ? 'Saving…' : 'Save payment'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ---------- More Tools Sheet ----------
function MoreToolsSheet({ student, onClose, onTrackCash }) {
  return (
    <div className="overlay" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="sheet">
        <h2>More tools — {student.name}</h2>
        <div className="tools-menu">
          <button onClick={onTrackCash}>💵 Track cash payment</button>
        </div>
        <div className="btn-row">
          <button className="btn cancel" onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

function StudentCard({ student, lessons, payments, bundles, onEdit, onDataChanged }) {
  const [open, setOpen] = useState(false);
  const [notesOpen, setNotesOpen] = useState(false);
  const [showMoreTools, setShowMoreTools] = useState(false);
  const [showCashModal, setShowCashModal] = useState(false);

  const studentLessons = lessons.filter(l => l.student_id === student.id)
    .sort((a, b) => new Date(b.lesson_date) - new Date(a.lesson_date));
  const studentPayments = payments.filter(p => p.student_id === student.id);
  const studentBundles = bundles.filter(b => b.student_id === student.id);

  const upcomingLessons = studentLessons.filter(l => l.status === 'scheduled')
    .sort((a, b) => new Date(a.lesson_date) - new Date(b.lesson_date));

  const completedLessons = studentLessons.filter(l => l.status === 'completed');
  const totalOwed = completedLessons
    .filter(l => !l.is_complimentary)
    .reduce((sum, l) => sum + (parseFloat(l.rate_charged) || 0), 0);
  const totalPaid = studentPayments.reduce((sum, p) => sum + parseFloat(p.amount), 0);
  const balance = totalOwed - totalPaid;

  const lastPaymentDate = studentPayments.length > 0
    ? studentPayments.sort((a, b) => new Date(b.date_paid) - new Date(a.date_paid))[0].date_paid
    : null;

  const daysSinceLastPayment = lastPaymentDate ? daysBetween(lastPaymentDate) : null;
  const isOverdue = balance > 0 && (daysSinceLastPayment === null || daysSinceLastPayment > 2);

  const nextLesson = upcomingLessons[0];

  const activeBundle = studentBundles.find(b => {
    const used = studentLessons.filter(l => l.bundle_id === b.id && l.status === 'completed').length;
    return used < b.number_of_sessions;
  });

  let bundleRemaining = null;
  if (activeBundle) {
    const used = studentLessons.filter(l => l.bundle_id === activeBundle.id && l.status === 'completed').length;
    bundleRemaining = activeBundle.number_of_sessions - used;
  }

  async function toggleComplimentary(lesson) {
    await supabase.from('tutoring_lessons').update({ is_complimentary: !lesson.is_complimentary }).eq('id', lesson.id);
    onDataChanged();
  }

  const displayYear = currentSchoolYear(student.school_year, student.school_year_as_of_date);

  const studentFirstName = student.name.split(' ')[0];
  const parentFirstName = (student.parent_name || '').split(' ')[0];
  const greeting = parentFirstName ? `Hi ${parentFirstName}!` : 'Hi!';
  const phone = normaliseUKPhone(student.parent_phone);
  const waMessage = balance > 0
    ? `${greeting} Just a friendly reminder we have an outstanding balance of £${balance.toFixed(2)} for ${studentFirstName}'s maths lessons. Let me know when's good to sort payment. Thanks!`
    : `${greeting} Just checking in about ${studentFirstName}'s next maths lesson.`;
  const waLink = phone ? `https://wa.me/${phone}?text=${encodeURIComponent(waMessage)}` : null;

  return (
    <div className="card">
      <div className="card-header" onClick={() => setOpen(!open)}>
        <div>
          <div className="student-name">{student.name}{!student.active && ' (inactive)'}</div>
          <div className="status-row">
            {balance > 0 && (
              <span className={`pill ${isOverdue ? 'warn' : 'neutral'}`}>
                {isOverdue ? `Overdue £${balance.toFixed(2)}` : `Owes £${balance.toFixed(2)}`}
              </span>
            )}
            {balance <= 0 && <span className="pill ok">Paid up</span>}
            {bundleRemaining !== null && bundleRemaining <= 1 && (
              <span className="pill warn">{bundleRemaining} session left</span>
            )}
            {nextLesson && (
              <span className="pill neutral">Next: {new Date(nextLesson.lesson_date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}</span>
            )}
            {displayYear && <span className="pill neutral">Y{displayYear}</span>}
            {student.has_extra_time && <span className="pill neutral">+25% time</span>}
          </div>
        </div>
        <span className={`chevron ${open ? 'open' : ''}`}>›</span>
      </div>

      <div className={`card-body${open ? ' open' : ''}`}>
          {(student.school || displayYear) && (
            <React.Fragment>
              <div className="section-label">Details</div>
              <div style={{ fontSize: '0.85rem', color: '#444' }}>
                {student.school}{displayYear ? `, Year ${displayYear}` : ''}{student.exam_board ? ` · ${student.exam_board}` : ''}{student.exam_tier && student.exam_tier !== 'not_sure' ? ` (${student.exam_tier})` : ''}
              </div>
            </React.Fragment>
          )}

          <div className="section-label">Recent lessons</div>
          {studentLessons.slice(0, 8).map(l => (
            <div className="lesson-row" key={l.id}>
              <span className="lesson-date">{new Date(l.lesson_date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</span>
              <div style={{display:'flex', alignItems:'center', gap:6}}>
                <span className={`lesson-status ${l.is_complimentary ? '' : l.status}`} style={l.is_complimentary ? {color:'var(--accent)'} : {}}>
                  {l.is_complimentary ? 'free lesson' : (l.status + (l.rate_charged ? ` · £${l.rate_charged}` : ''))}
                </span>
                {l.status === 'completed' && (
                  <button className={`free-btn ${l.is_complimentary ? 'active' : 'inactive'}`} onClick={() => toggleComplimentary(l)}>
                    {l.is_complimentary ? '✓ free' : 'mark free'}
                  </button>
                )}
              </div>
            </div>
          ))}
          {studentLessons.length === 0 && <div style={{ fontSize: '0.85rem', color: 'var(--muted)' }}>No lessons logged yet.</div>}

          <div className="actions">
            {waLink && <a className="btn whatsapp" href={waLink} target="_blank" rel="noopener">WhatsApp parent</a>}
            <button className="btn edit" onClick={() => onEdit(student)}>Edit</button>
            <button className="btn more" onClick={() => setShowMoreTools(true)}>More tools</button>
            {student.general_notes && (
              <button className="btn notes" onClick={() => setNotesOpen(!notesOpen)}>
                {notesOpen ? 'Hide notes' : 'Notes'}
              </button>
            )}
          </div>

          {student.general_notes && (
            <div className={`notes-box ${notesOpen ? 'visible' : ''}`}>{student.general_notes}</div>
          )}
        </div>
      </div>

      {showMoreTools && (
        <MoreToolsSheet
          student={student}
          onClose={() => setShowMoreTools(false)}
          onTrackCash={() => { setShowMoreTools(false); setShowCashModal(true); }}
        />
      )}

      {showCashModal && (
        <CashPaymentModal
          student={student}
          upcomingLessons={upcomingLessons}
          onClose={() => setShowCashModal(false)}
          onSaved={() => { setShowCashModal(false); onDataChanged(); }}
        />
      )}
    </div>
  );
}

function App() {
  const [students, setStudents] = useState([]);
  const [lessons, setLessons] = useState([]);
  const [payments, setPayments] = useState([]);
  const [bundles, setBundles] = useState([]);
  const [rateHistory, setRateHistory] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showAddModal, setShowAddModal] = useState(false);
  const [editingStudent, setEditingStudent] = useState(null);
  const [showGlobalTools, setShowGlobalTools] = useState(false);

  async function loadAll() {
    const [s, l, p, b, r] = await Promise.all([
      supabase.from('tutoring_students').select('*').order('active', { ascending: false }).order('name'),
      supabase.from('tutoring_lessons').select('*'),
      supabase.from('tutoring_payments').select('*'),
      supabase.from('tutoring_bundles').select('*'),
      supabase.from('tutoring_rate_history').select('*')
    ]);
    setStudents(s.data || []);
    setLessons(l.data || []);
    setPayments(p.data || []);
    setBundles(b.data || []);
    setRateHistory(r.data || []);
    setLoading(false);
  }

  useEffect(() => { loadAll(); }, []);

  const activeStudents = students.filter(s => s.active);
  const inactiveStudents = students.filter(s => !s.active);

  return (
    <div>
      <div className="subtitle">
        <div>
          <h1>Maths Tutoring</h1>
          {activeStudents.length} active student{activeStudents.length !== 1 ? 's' : ''}
        </div>
        <button className="add-btn" onClick={() => setShowAddModal(true)}>+ Add student</button>
      </div>

      {!loading && <SummaryWidget students={students} rateHistory={rateHistory} />}

      {loading && <div className="loading">Loading…</div>}

      {!loading && activeStudents.length === 0 && inactiveStudents.length === 0 && (
        <div className="empty">No students yet. Tap "+ Add student" to get started.</div>
      )}

      {!loading && activeStudents.map(s => (
        <StudentCard key={s.id} student={s} lessons={lessons} payments={payments} bundles={bundles}
          onEdit={setEditingStudent} onDataChanged={loadAll} />
      ))}

      {!loading && inactiveStudents.length > 0 && (
        <React.Fragment>
          <div className="section-label" style={{ marginTop: 24 }}>Inactive</div>
          {inactiveStudents.map(s => (
            <StudentCard key={s.id} student={s} lessons={lessons} payments={payments} bundles={bundles}
              onEdit={setEditingStudent} onDataChanged={loadAll} />
          ))}
        </React.Fragment>
      )}

      {showAddModal && (
        <StudentFormModal
          onClose={() => setShowAddModal(false)}
          onSaved={() => { setShowAddModal(false); loadAll(); }}
        />
      )}

      <button className="global-tools-btn" onClick={() => setShowGlobalTools(true)}>⚙ Tools</button>

      {showGlobalTools && (
        <GlobalToolsSheet students={students} rateHistory={rateHistory} onClose={() => setShowGlobalTools(false)} />
      )}

      {editingStudent && (
        <StudentFormModal
          student={editingStudent}
          onClose={() => setEditingStudent(null)}
          onSaved={() => { setEditingStudent(null); loadAll(); }}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
